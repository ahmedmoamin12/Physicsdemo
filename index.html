<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منصة الفيزياء التعليمية | أ. أحمد عبدالحميد</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #020818;
      --deep: #050d2a;
      --blue: #1a56db;
      --electric: #3b82f6;
      --cyan: #06b6d4;
      --gold: #f59e0b;
      --gold-light: #fcd34d;
      --white: #f8fafc;
      --muted: #94a3b8;
      --card-bg: rgba(255,255,255,0.04);
      --card-border: rgba(255,255,255,0.08);
      --glass: rgba(255,255,255,0.06);
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--navy);
      color: var(--white);
      overflow-x: hidden;
    }

    /* ═══════════════════════════════════════
       ANIMATED BACKGROUND
    ═══════════════════════════════════════ */
    .bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.18;
      animation: drift 14s ease-in-out infinite alternate;
    }
    .bg-orb:nth-child(1) { width:600px;height:600px;top:-100px;right:-150px;background:#1a56db; animation-delay:0s; }
    .bg-orb:nth-child(2) { width:400px;height:400px;bottom:10%;left:-100px;background:#06b6d4; animation-delay:3s; }
    .bg-orb:nth-child(3) { width:300px;height:300px;top:40%;left:40%;background:#f59e0b; animation-delay:6s;opacity:0.10; }

    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(30px, 40px) scale(1.08); }
    }

    .star-field {
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 35% 60%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 10%, rgba(255,255,255,0.6) 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 35%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 10% 75%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 45% 45%, rgba(59,130,246,0.7) 0%, transparent 100%),
        radial-gradient(1px 1px at 65% 25%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 90%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 80% 55%, rgba(6,182,212,0.6) 0%, transparent 100%);
    }

    /* ═══════════════════════════════════════
       NAV BAR
    ═══════════════════════════════════════ */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 16px 5%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(2,8,24,0.7);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--card-border);
      transition: all 0.3s;
    }

    .nav-logo {
      font-size: 22px;
      font-weight: 800;
      color: var(--gold);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .nav-logo span { font-size: 28px; }

    .nav-links {
      display: flex;
      gap: 8px;
      list-style: none;
    }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 15px;
      padding: 8px 16px;
      border-radius: 10px;
      transition: all 0.3s;
    }
    .nav-links a:hover {
      color: var(--white);
      background: var(--glass);
    }
    .nav-cta {
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      color: white !important;
      border-radius: 12px !important;
      font-weight: 700 !important;
    }

    /* ═══════════════════════════════════════
       HERO
    ═══════════════════════════════════════ */
    .hero {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 120px 20px 80px;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(245,158,11,0.12);
      border: 1px solid rgba(245,158,11,0.3);
      padding: 8px 20px;
      border-radius: 50px;
      font-size: 14px;
      color: var(--gold-light);
      margin-bottom: 30px;
      animation: fadeSlideDown 0.8s ease both;
    }

    .hero h1 {
      font-size: clamp(42px, 7vw, 90px);
      font-weight: 900;
      line-height: 1.15;
      margin-bottom: 20px;
      animation: fadeSlideDown 0.9s 0.1s ease both;
    }

    .hero h1 .gradient-text {
      background: linear-gradient(135deg, var(--gold), var(--cyan), var(--electric));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      font-size: clamp(17px, 2.5vw, 22px);
      color: var(--muted);
      max-width: 680px;
      line-height: 1.9;
      margin-bottom: 45px;
      animation: fadeSlideDown 1s 0.2s ease both;
    }

    .hero-buttons {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
      animation: fadeSlideDown 1.1s 0.3s ease both;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--blue) 0%, var(--cyan) 100%);
      color: white;
      border: none;
      padding: 16px 36px;
      border-radius: 14px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s;
      box-shadow: 0 0 30px rgba(59,130,246,0.35);
    }
    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 50px rgba(59,130,246,0.55);
    }

    .btn-ghost {
      background: var(--glass);
      border: 1px solid var(--card-border);
      color: white;
      padding: 16px 36px;
      border-radius: 14px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
    }
    .btn-ghost:hover {
      background: rgba(255,255,255,0.1);
      transform: translateY(-3px);
    }

    /* Stats row */
    .stats-row {
      display: flex;
      gap: 50px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 70px;
      animation: fadeSlideDown 1.2s 0.4s ease both;
    }
    .stat-item { text-align: center; }
    .stat-num {
      font-size: 42px;
      font-weight: 900;
      color: var(--gold);
      display: block;
    }
    .stat-label {
      font-size: 15px;
      color: var(--muted);
    }

    /* Scroll indicator */
    .scroll-indicator {
      position: absolute;
      bottom: 35px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      animation: bounceDown 2s ease infinite;
    }
    .scroll-indicator::after {
      content: '';
      display: block;
      width: 2px;
      height: 40px;
      background: linear-gradient(to bottom, var(--electric), transparent);
      border-radius: 2px;
    }

    @keyframes bounceDown {
      0%,100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(8px); }
    }

    /* ═══════════════════════════════════════
       TEACHER SECTION
    ═══════════════════════════════════════ */
    section {
      position: relative;
      z-index: 1;
      padding: 90px 5%;
    }

    .section-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--cyan);
      margin-bottom: 16px;
    }
    .section-label::before {
      content: '';
      display: block;
      width: 30px;
      height: 2px;
      background: var(--cyan);
    }

    .section-title {
      font-size: clamp(30px, 4vw, 48px);
      font-weight: 800;
      margin-bottom: 15px;
    }

    .section-sub {
      color: var(--muted);
      font-size: 18px;
      max-width: 600px;
    }

    .teacher-card {
      margin-top: 50px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      padding: 50px;
      display: flex;
      gap: 50px;
      align-items: center;
      flex-wrap: wrap;
      backdrop-filter: blur(20px);
      position: relative;
      overflow: hidden;
    }
    .teacher-card::before {
      content: '';
      position: absolute;
      top: -1px; right: -1px;
      width: 200px; height: 3px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .teacher-avatar {
      width: 170px;
      height: 170px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 80px;
      flex-shrink: 0;
      box-shadow: 0 0 60px rgba(59,130,246,0.4);
      position: relative;
    }
    .teacher-avatar::after {
      content: '⭐';
      position: absolute;
      bottom: 5px;
      right: 5px;
      font-size: 24px;
      background: var(--navy);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .teacher-info { flex: 1; min-width: 260px; }
    .teacher-name {
      font-size: 40px;
      font-weight: 900;
      margin-bottom: 10px;
    }
    .teacher-title {
      color: var(--cyan);
      font-size: 18px;
      margin-bottom: 25px;
      font-weight: 600;
    }

    .teacher-features {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 30px;
    }
    .feature-tag {
      background: rgba(59,130,246,0.12);
      border: 1px solid rgba(59,130,246,0.25);
      padding: 8px 16px;
      border-radius: 50px;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .teacher-contacts {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .contact-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 13px 24px;
      border-radius: 14px;
      text-decoration: none;
      font-size: 16px;
      font-weight: 700;
      transition: all 0.3s;
      cursor: pointer;
      border: none;
    }
    .btn-wa { background: #25D366; color: white; }
    .btn-wa:hover { background: #1ebe5d; transform: translateY(-3px); box-shadow: 0 8px 25px rgba(37,211,102,0.4); }
    .btn-phone { background: var(--glass); border: 1px solid var(--card-border); color: white; backdrop-filter: blur(10px); }
    .btn-phone:hover { background: rgba(255,255,255,0.1); transform: translateY(-3px); }

    /* ═══════════════════════════════════════
       CHAPTERS / TOPICS
    ═══════════════════════════════════════ */
    .chapters-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 24px;
      margin-top: 50px;
    }

    .chapter-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 35px;
      backdrop-filter: blur(20px);
      transition: all 0.4s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .chapter-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 60%, rgba(255,255,255,0.03));
      opacity: 0;
      transition: opacity 0.4s;
    }
    .chapter-card:hover { transform: translateY(-8px); border-color: rgba(255,255,255,0.15); }
    .chapter-card:hover::before { opacity: 1; }

    .chapter-icon {
      width: 65px;
      height: 65px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin-bottom: 22px;
    }
    .icon-blue { background: rgba(59,130,246,0.15); border: 1px solid rgba(59,130,246,0.25); }
    .icon-cyan { background: rgba(6,182,212,0.15); border: 1px solid rgba(6,182,212,0.25); }
    .icon-gold { background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.25); }
    .icon-purple { background: rgba(139,92,246,0.15); border: 1px solid rgba(139,92,246,0.25); }

    .chapter-num {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .chapter-title {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 14px;
    }

    .chapter-desc {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.8;
      margin-bottom: 22px;
    }

    .lesson-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 25px;
    }
    .lesson-pill {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 5px 12px;
      border-radius: 50px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .lesson-pill::before { content: '✓'; color: var(--cyan); font-weight: 700; }

    .progress-bar-wrap {
      margin-bottom: 22px;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .progress-track {
      height: 6px;
      background: rgba(255,255,255,0.06);
      border-radius: 50px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 50px;
      background: linear-gradient(90deg, var(--blue), var(--cyan));
      width: 0%;
      transition: width 1.2s ease;
    }

    .chapter-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .lesson-count { font-size: 13px; color: var(--muted); }

    .btn-start {
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      color: white;
      border: none;
      padding: 11px 22px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s;
      font-family: 'Cairo', sans-serif;
    }
    .btn-start:hover { transform: scale(1.05); box-shadow: 0 5px 20px rgba(59,130,246,0.4); }
    .btn-start span { transition: transform 0.3s; display: inline-block; }
    .btn-start:hover span { transform: translateX(-5px); }

    /* ═══════════════════════════════════════
       FEATURES SECTION
    ═══════════════════════════════════════ */
    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-top: 50px;
    }

    .feature-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 30px;
      backdrop-filter: blur(20px);
      transition: all 0.3s;
      text-align: center;
    }
    .feature-card:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.12); }

    .feature-icon {
      font-size: 42px;
      margin-bottom: 16px;
      display: block;
    }

    .feature-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .feature-desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.8;
    }

    /* ═══════════════════════════════════════
       QUIZ / INTERACTIVE
    ═══════════════════════════════════════ */
    .quiz-box {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      padding: 50px;
      backdrop-filter: blur(20px);
      margin-top: 50px;
      position: relative;
      overflow: hidden;
    }
    .quiz-box::after {
      content: '⚛';
      position: absolute;
      left: -20px;
      bottom: -30px;
      font-size: 180px;
      opacity: 0.04;
      pointer-events: none;
    }

    .quiz-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 35px;
      flex-wrap: wrap;
      gap: 15px;
    }
    .quiz-progress-track {
      height: 6px;
      background: rgba(255,255,255,0.06);
      border-radius: 50px;
      overflow: hidden;
      margin-bottom: 35px;
    }
    .quiz-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--electric));
      border-radius: 50px;
      transition: width 0.5s ease;
    }

    .question-text {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 30px;
      line-height: 1.7;
    }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 30px;
    }

    .option-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      padding: 16px 20px;
      border-radius: 14px;
      font-size: 16px;
      cursor: pointer;
      text-align: right;
      transition: all 0.25s;
      font-family: 'Cairo', sans-serif;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .option-btn:hover:not(:disabled) { background: rgba(59,130,246,0.15); border-color: rgba(59,130,246,0.4); transform: scale(1.02); }
    .option-btn.correct { background: rgba(16,185,129,0.2); border-color: #10b981; }
    .option-btn.wrong { background: rgba(239,68,68,0.2); border-color: #ef4444; }
    .option-letter {
      width: 32px;
      height: 32px;
      background: rgba(255,255,255,0.08);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .quiz-feedback {
      padding: 16px 22px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 20px;
      display: none;
    }
    .feedback-correct { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.35); color: #6ee7b7; }
    .feedback-wrong { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.35); color: #fca5a5; }

    .quiz-nav { display: flex; gap: 12px; justify-content: flex-end; }
    .btn-next {
      background: linear-gradient(135deg, var(--gold), #f97316);
      color: white;
      border: none;
      padding: 13px 28px;
      border-radius: 13px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
      transition: all 0.3s;
      display: none;
    }
    .btn-next:hover { transform: scale(1.05); }

    .quiz-score-box {
      text-align: center;
      padding: 30px;
      display: none;
    }
    .score-num {
      font-size: 72px;
      font-weight: 900;
      color: var(--gold);
    }

    /* ═══════════════════════════════════════
       SCHEDULE SECTION
    ═══════════════════════════════════════ */
    .schedule-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-top: 50px;
    }

    .day-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 25px;
      backdrop-filter: blur(20px);
      transition: all 0.3s;
      text-align: center;
    }
    .day-card.active {
      background: rgba(59,130,246,0.12);
